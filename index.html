<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠션어 변환기 AI · Groq</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif; background:linear-gradient(180deg,#f8fbff,#eef6ff); color:#1f2937; }
    .container { max-width:1100px; margin:0 auto; }
    .card { background:#fff; border-radius:24px; padding:24px; box-shadow:0 18px 44px rgba(59,130,246,.10); border:1px solid rgba(59,130,246,.10); }
    .top { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .section { display:grid; grid-template-columns:380px 1fr; gap:20px; }
    h1 { margin:0 0 10px; font-size:38px; line-height:1.1; }
    h2 { margin:0 0 8px; font-size:24px; }
    p { color:#6b7280; line-height:1.6; }
    .badge { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:#1d4ed8; font-weight:700; font-size:13px; margin-bottom:14px; }
    label { display:block; font-size:13px; font-weight:800; margin:14px 0 8px; }
    select, textarea { width:100%; border:1px solid rgba(59,130,246,.18); border-radius:16px; padding:14px; font-size:15px; font-family:inherit; }
    textarea { min-height:180px; resize:vertical; }
    .buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    button { border:none; border-radius:16px; padding:14px 16px; font-size:14px; font-weight:800; cursor:pointer; }
    .primary { background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; }
    .secondary { background:#fff; border:1px solid rgba(59,130,246,.16); color:#1f2937; }
    .results { min-height:500px; }
    .status { display:inline-block; padding:10px 14px; border-radius:999px; background:#eff6ff; color:#1d4ed8; font-weight:800; font-size:13px; }
    .result-item { background:#fff; border:1px solid rgba(59,130,246,.12); border-radius:18px; padding:16px; margin-top:14px; }
    .result-top { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
    .copy-btn { border:none; background:#fff; border:1px solid rgba(59,130,246,.16); border-radius:12px; padding:9px 12px; font-weight:700; }
    .reply { font-size:17px; line-height:1.65; white-space:pre-wrap; }
    .meta { color:#6b7280; font-size:13px; margin-top:8px; }
    .empty { min-height:350px; display:grid; place-items:center; border:1.5px dashed rgba(59,130,246,.18); border-radius:20px; color:#6b7280; text-align:center; padding:20px; }
    .tip { margin-top:14px; padding:14px; border-radius:16px; background:#f8fbff; border:1px solid rgba(59,130,246,.1); color:#6b7280; font-size:13px; }
    @media (max-width: 900px) { .top,.section { grid-template-columns:1fr; } .buttons{ grid-template-columns:1fr; } h1 { font-size:30px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="card">
        <div class="badge">AI 기반 자동 변환</div>
        <h1>하고 싶은 말은 살리고,<br>받아들이기 쉽게 바꾸기</h1>
        <p>자연스럽게 말하고 싶은데 표현이 고민될 때, 한 번에 부드럽게 정리해줍니다.</p>
      </div>
      <div class="card">
        <div class="badge">예시</div>
        <p><b>원문</b> 답장이 너무 느려</p>
        <p><b>변환</b> 혹시 조금만 더 빨리 확인해줄 수 있을까?</p>
        <p><b>원문</b> 이거 다시 수정해줘</p>
        <p><b>변환</b> 이 부분만 한 번 더 봐줄 수 있을까?</p>
      </div>
    </div>

    <div class="section">
      <div class="card">
        <h2>문장 다듬기</h2>
        <p>AI가 문맥에 맞춰 부드러운 표현 3개를 생성합니다.</p>

        <label for="relationship">상대와 관계</label>
        <select id="relationship">
          <option value="기본">기본</option>
          <option value="연인/썸">연인/썸</option>
          <option value="친구">친구</option>
          <option value="직장/팀플">직장/팀플</option>
          <option value="조심스럽게">조심스럽게</option>
        </select>

        <label for="message">하고 싶은 말</label>
        <textarea id="message" placeholder="예: 답장이 너무 느려"></textarea>

        <div class="buttons">
          <button class="primary" id="generateBtn">AI로 바꾸기</button>
          <button class="secondary" id="sampleBtn">예시 넣기</button>
          <button class="secondary" id="resetBtn">초기화</button>
        </div>

        <div class="tip">AI가 실시간으로 문장을 자연스럽게 다듬어줍니다.</div>

      <div class="card results">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
          <div>
            <h2>AI 변환 결과</h2>
            <p>의미는 유지하고 말투만 더 부드럽게 바꿉니다.</p>
          </div>
          <div class="status" id="statusChip">대기 중</div>
        </div>

        <div id="results">
          <div class="empty">
            <div>
              <div style="font-size:32px;margin-bottom:10px;">📝</div>
              <div>아직 변환된 문장이 없어요</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const relationshipEl = document.getElementById('relationship');
    const messageEl = document.getElementById('message');
    const resultsEl = document.getElementById('results');
    const statusChip = document.getElementById('statusChip');

    document.getElementById('sampleBtn').addEventListener('click', () => {
      relationshipEl.value = '기본';
      messageEl.value = '답장이 너무 느려';
      generateWithAI();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      relationshipEl.value = '기본';
      messageEl.value = '';
      statusChip.textContent = '대기 중';
      resultsEl.innerHTML = '<div class="empty"><div><div style="font-size:32px;margin-bottom:10px;">📝</div><div>아직 변환된 문장이 없어요</div></div></div>';
    });

    document.getElementById('generateBtn').addEventListener('click', generateWithAI);

    async function generateWithAI() {
      const relationship = relationshipEl.value;
      const message = messageEl.value.trim();

      if (!message) {
        statusChip.textContent = '입력 필요';
        resultsEl.innerHTML = '<div class="empty"><div><div style="font-size:32px;margin-bottom:10px;">✍️</div><div>문장을 먼저 입력해줘</div></div></div>';
        return;
      }

      statusChip.textContent = '생성 중';
      resultsEl.innerHTML = '<div class="empty"><div><div style="font-size:32px;margin-bottom:10px;">⏳</div><div>AI가 문장을 다듬는 중</div></div></div>';

      try {
        const response = await fetch('/api/cushion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ relationship, message })
        });

        const raw = await response.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw || '서버가 JSON이 아닌 응답을 반환했습니다.');
        }

        if (!response.ok) throw new Error(data.error || '요청에 실패했습니다.');

        const replies = Array.isArray(data.replies) ? data.replies : [];
        statusChip.textContent = '변환 완료';

        resultsEl.innerHTML = replies.map((reply, i) => `
          <div class="result-item">
            <div class="result-top">
              <div class="badge">버전 ${i + 1}</div>
              <button class="copy-btn" data-text="${escapeHtml(reply)}">복사</button>
            </div>
            <div class="reply">${escapeHtml(reply)}</div>
            <div class="meta">관계 톤: ${escapeHtml(relationship)}</div>
          </div>
        `).join('');

        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const text = btn.getAttribute('data-text');
            await navigator.clipboard.writeText(text);
            const old = btn.textContent;
            btn.textContent = '복사됨';
            setTimeout(() => btn.textContent = old, 1000);
          });
        });
      } catch (error) {
        statusChip.textContent = '오류';
        resultsEl.innerHTML = `<div class="empty"><div><div style="font-size:32px;margin-bottom:10px;">⚠️</div><div>${escapeHtml(error.message || '오류')}</div></div></div>`;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
